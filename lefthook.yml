pre-commit:
  parallel: true
  commands:
    biome-fix-staged:
      glob: "*.{js,ts,mjs,mts,json,jsonc}"
      exclude: "packs/**"
      run: npx @biomejs/biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true
      skip:
        # Skip on Linux when node_modules were installed on macOS (darwin binaries present but linux binaries missing).
        # Run `pnpm install` in the Linux environment to fix this properly.
        - run: sh -c 'test "$(uname -s)" = "Linux" && ls node_modules/.pnpm/ 2>/dev/null | grep -q "^@biomejs+cli-darwin-arm64@"'
    prettier-svelte:
      glob: "*.svelte"
      run: npx prettier --write {staged_files}
      stage_fixed: true

pre-push:
  output:
    colored: false
    meta: false
  env:
    NO_COLOR: "1"
    FORCE_COLOR: "0"
    CLICOLOR: "0"
    CLICOLOR_FORCE: "0"
    TERM: "dumb"
  commands:
    check:
      glob: "*.{js,ts,mjs,mts,json,jsonc}"
      exclude: "packs/**"
      run: npx @biomejs/biome check --no-errors-on-unmatched --error-on-warnings --files-ignore-unknown=true {push_files} 2>&1 | sed -E 's/\x1b\[[0-9;]*[a-zA-Z]//g; s/\x1b\]11;rgb:[^;]*;[^R]*R//g'
      skip:
        - run: sh -c 'test "$(uname -s)" = "Linux" && ls node_modules/.pnpm/ 2>/dev/null | grep -q "^@biomejs+cli-darwin-arm64@"'
    typecheck:
      run: npm run type-check 2>&1 | sed -E 's/\x1b\[[0-9;]*[a-zA-Z]//g; s/\x1b\]11;rgb:[^;]*;[^R]*R//g'
      skip:
        - run: sh -c 'test "$(uname -s)" = "Linux" && ls node_modules/.pnpm/ 2>/dev/null | grep -q "^@biomejs+cli-darwin-arm64@"'
    tests:
      glob: "*.{js,ts,mjs,mts,svelte}"
      run: npm run test 2>&1 | sed -E 's/\x1b\[[0-9;]*[a-zA-Z]//g; s/\x1b\]11;rgb:[^;]*;[^R]*R//g'
      skip:
        - run: sh -c 'test "$(uname -s)" = "Linux" && ls node_modules/.pnpm/ 2>/dev/null | grep -q "^@biomejs+cli-darwin-arm64@"'
