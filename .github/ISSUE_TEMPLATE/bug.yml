name: Bug Report
description: Report a bug in the Nimble FoundryVTT system
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below so we can reproduce and fix it.

  - type: input
    id: foundry-version
    attributes:
      label: Foundry VTT Version
      placeholder: "e.g. 12.331"
    validations:
      required: true

  - type: input
    id: nimble-version
    attributes:
      label: Nimble System Version
      placeholder: "e.g. 0.8.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Open a character sheet
        2. Click on...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, console errors, active modules, browser info, etc.
    validations:
      required: false
