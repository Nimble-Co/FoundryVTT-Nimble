name: Biome Format

on:
  - pull_request

env:
  node_version: 22

jobs:
  format:
    name: Format Code
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: checkout code (same-repo PRs)
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: checkout code (fork PRs)
        if: github.event.pull_request.head.repo.full_name != github.repository
        uses: actions/checkout@v4

      - name: install node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.node_version }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store/v10
          key: pnpm-${{ github.head_ref }}-${{ github.event.pull_request.head.sha }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ github.head_ref }}-
            pnpm-dev-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Biome
        uses: biomejs/setup-biome@v2

      - name: Run format (same-repo PRs)
        if: github.event.pull_request.head.repo.full_name == github.repository
        run: pnpm format

      - name: Commit formatted changes (same-repo PRs)
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Format code with Biome'
          branch: ${{ github.head_ref }}
          file_pattern: '*.ts *.tsx *.js *.jsx *.json *.svelte *.css *.scss *.md'
          add_options: '--ignore-missing'

      - name: Check format (fork PRs)
        if: github.event.pull_request.head.repo.full_name != github.repository
        run: |
          pnpm format
          if ! git diff --exit-code; then
            echo "❌ Code is not formatted. Please run 'pnpm format' locally and commit the changes."
            exit 1
          fi
          echo "✅ Code is properly formatted."
