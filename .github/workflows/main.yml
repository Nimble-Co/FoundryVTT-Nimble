name: Nimble 2 System Version Release

on:
  release:
    types: [published]

env:
  node_version: 22

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ env.node_version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.node_version }}

    - name: Cache Node.js modules
      uses: actions/cache@v4
      with:
        path: .npm
        key: npm-release-${{ github.sha }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          npm-dev-

    - name: Install Dependencies
      run: npm ci --cache .npm --prefer-offline

    # Builds Packs
    - name: Build System
      run: npm run build

    # get part of the tag after the `v`
    - name: Extract tag version number
      id: get_version
      uses: battila7/get-version-action@v2

    # Substitute the Manifest and Download URLs in the system.json for STABLE releases
    - name: Substitute Manifest and Download Links (Stable)
      if: ${{ !github.event.release.prerelease }}
      uses: microsoft/variable-substitution@v1
      with:
        files: './dist/system.json'
      env:
        version: ${{steps.get_version.outputs.version-without-v}}
        url: https://github.com/${{github.repository}}
        manifest: https://github.com/${{github.repository}}/releases/latest/download/system.json
        download: https://github.com/${{github.repository}}/releases/download/${{github.event.release.tag_name}}/nimble.zip

    # Substitute the Manifest and Download URLs in the system.json for BETA releases
    # Uses different system ID so beta can be installed alongside stable
    - name: Substitute Manifest and Download Links (Beta)
      if: ${{ github.event.release.prerelease }}
      uses: microsoft/variable-substitution@v1
      with:
        files: './dist/system.json'
      env:
        id: nimble-beta
        title: "Nimble (Beta)"
        version: ${{steps.get_version.outputs.version-without-v}}
        url: https://github.com/${{github.repository}}
        manifest: https://github.com/${{github.repository}}/releases/download/${{github.event.release.tag_name}}/system.json
        download: https://github.com/${{github.repository}}/releases/download/${{github.event.release.tag_name}}/nimble-beta.zip

    # Create a zip file with all files required by the system to add to the release
    - name: Zip Files (Stable)
      if: ${{ !github.event.release.prerelease }}
      working-directory: ./dist
      run: zip -r ./nimble.zip ./*

    - name: Zip Files (Beta)
      if: ${{ github.event.release.prerelease }}
      working-directory: ./dist
      run: zip -r ./nimble-beta.zip ./*

    # Create a release for stable versions
    - name: Update Release with Files (Stable)
      if: ${{ !github.event.release.prerelease }}
      uses: ncipollo/release-action@v1
      with:
        allowUpdates: true
        name: ${{ github.event.release.name }}
        draft: false
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: './dist/system.json, ./dist/nimble.zip'
        tag: ${{ github.event.release.tag_name }}
        body: ${{ github.event.release.body }}

    # Create a release for beta versions
    - name: Update Release with Files (Beta)
      if: ${{ github.event.release.prerelease }}
      uses: ncipollo/release-action@v1
      with:
        allowUpdates: true
        name: ${{ github.event.release.name }}
        draft: false
        prerelease: true
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: './dist/system.json, ./dist/nimble-beta.zip'
        tag: ${{ github.event.release.tag_name }}
        body: ${{ github.event.release.body }}

    # Publish stable releases to the main FoundryVTT package
    - name: Publish to FoundryVTT Website (Stable)
      if: ${{ !github.event.release.prerelease }}
      uses: cs96and/FoundryVTT-release-package@v1
      with:
        package-token: ${{ secrets.PACKAGE_TOKEN }}
        manifest-url: https://github.com/${{github.repository}}/releases/download/${{github.event.release.tag_name}}/system.json
        notes-url: https://github.com/${{github.repository}}/releases/tag/${{github.event.release.tag_name}}/

    # Publish beta releases to the beta FoundryVTT package
    # Requires PACKAGE_TOKEN_BETA secret with token from nimble-beta package registration
    - name: Publish to FoundryVTT Website (Beta)
      if: ${{ github.event.release.prerelease }}
      uses: cs96and/FoundryVTT-release-package@v1
      with:
        package-token: ${{ secrets.PACKAGE_TOKEN_BETA }}
        manifest-url: https://github.com/${{github.repository}}/releases/download/${{github.event.release.tag_name}}/system.json
        notes-url: https://github.com/${{github.repository}}/releases/tag/${{github.event.release.tag_name}}/
