---
name: Code quality checks

on: # yamllint disable-line rule:truthy
  - pull_request

env:
  node_version: 22

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: install node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.node_version }}
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store/v10
          key: pnpm-${{ github.head_ref }}-${{ github.event.pull_request.head.sha }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ github.head_ref }}-
            pnpm-dev-
      - run: pnpm install --frozen-lockfile
      - name: compile typescript
        run: pnpm type-check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.node_version }}
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store/v10
          key: pnpm-${{ github.head_ref }}-${{ github.event.pull_request.head.sha }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ github.head_ref }}-
            pnpm-dev-
      - run: pnpm install --frozen-lockfile
      - name: Run Svelte and Biome linters
        run: pnpm lint

  circular-deps:
    name: Circular Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: install node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.node_version }}
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store/v10
          key: pnpm-${{ github.head_ref }}-${{ github.event.pull_request.head.sha }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ github.head_ref }}-
            pnpm-dev-
      - run: pnpm install --frozen-lockfile
      - name: Check circular dependencies
        run: pnpm circular-deps
