name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      # Inputs to the generated reference pages (pnpm docs:generate)
      - 'src/models/rules/**'
      - 'src/settings/**'
      - 'src/config.ts'
      - 'src/config/**'
      - 'src/hooks/init.ts'
      - 'src/hooks/i18nInit.ts'
      - 'public/lang/en.json'
      - 'scripts/docs/**'
      - 'vitest.docsGen.config.mts'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml

      - name: Install system dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate reference pages
        run: pnpm docs:generate

      - name: Install docs dependencies
        run: pnpm install --frozen-lockfile
        working-directory: docs

      - name: Build docs
        run: pnpm build
        working-directory: docs

      - name: Disable Jekyll
        run: touch docs/.vitepress/dist/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
